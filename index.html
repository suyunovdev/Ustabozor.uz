  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* ============================================
       MOBILE (iOS / Android) RESPONSIVE FIXES
       ============================================ */

    /* ── Safe Area Inset Utilities ──
       iPhone notch / Dynamic Island / home bar support */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    .pt-safe { padding-top:    env(safe-area-inset-top,    0px); }
    .pl-safe { padding-left:   env(safe-area-inset-left,   0px); }
    .pr-safe { padding-right:  env(safe-area-inset-right,  0px); }

    /* Content bottom padding = nav (4rem) + home bar */
    .pb-nav  { padding-bottom: calc(4rem + env(safe-area-inset-bottom, 0px)); }

    /* ── iOS: Prevent input auto-zoom ──
       iOS Safari zooms when input font-size < 16px */
    @supports (-webkit-touch-callout: none) {
      input:not([type="radio"]):not([type="checkbox"]):not([type="range"]),
      select,
      textarea {
        font-size: max(16px, 1em) !important;
      }
    }

    /* ── Remove blue tap highlight on all touch devices ── */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Faster tap response: no 300ms delay / no double-tap zoom ── */
    button, a, [role="button"], select, label {
      touch-action: manipulation;
    }

    /* ── Prevent rubber-band overscroll bounce (native app feel) ── */
    html {
      overscroll-behavior: none;
    }

    /* ── Smooth momentum scrolling on iOS ── */
    .overflow-y-auto,
    .overflow-y-scroll,
    .overflow-x-auto {
      -webkit-overflow-scrolling: touch;
    }

    /* ── Prevent text selection on UI chrome ── */
    button, nav, .no-select {
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Hide scrollbar for mobile-like feel in containers ── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* ── Smooth background transition ── */
    body,
    div,
    nav,
    button,
    input,
    select,
    textarea {
      transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 300ms;
    }
  </style>
